<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>One-Digit Multiplication Game</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #cfe8f7;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #1a4a6e;
      margin-bottom: 10px;
    }

    #stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      max-width: 450px;
      margin: 0 auto 15px auto;
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      max-width: 450px;
      margin: auto;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .q-text {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 14px;
      border-radius: 10px;
      border: 2px solid #f3e5ab;
      background: #fff4b3;
      font-size: 18px;
      font-weight: bold;
      color: #5d4037;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: #ffeaa7;
      transform: translateY(-2px);
    }

    .star-display {
      font-size: 22px;
      color: #f1c40f;
      margin-top: 15px;
      word-wrap: break-word;
    }

    #result {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<h2>🔢 One-Digit Multiplication Game</h2>

<div id="stats-container">
  <div id="score">Score: 0 / 30</div>
  <div id="star-counter">Stars: 0 ⭐</div>
</div>

<div class="box" id="quiz"></div>
<div id="result"></div>

<script>
// ---------- 30 One-Digit by One-Digit Multiplication Questions ----------
let questions = [
  {q: "3 × 4 = ?", options: ["12", "14", "9"], answer: 0},
  {q: "5 × 6 = ?", options: ["30", "25", "36"], answer: 0},
  {q: "7 × 3 = ?", options: ["21", "24", "18"], answer: 0},
  {q: "2 × 8 = ?", options: ["16", "14", "18"], answer: 0},
  {q: "4 × 9 = ?", options: ["36", "32", "40"], answer: 0},
  {q: "6 × 7 = ?", options: ["42", "48", "36"], answer: 0},
  {q: "8 × 5 = ?", options: ["40", "45", "35"], answer: 0},
  {q: "9 × 3 = ?", options: ["27", "24", "30"], answer: 0},
  {q: "4 × 4 = ?", options: ["16", "12", "20"], answer: 0},
  {q: "7 × 7 = ?", options: ["49", "56", "42"], answer: 0},
  {q: "3 × 6 = ?", options: ["18", "15", "21"], answer: 0},
  {q: "5 × 9 = ?", options: ["45", "40", "50"], answer: 0},
  {q: "8 × 8 = ?", options: ["64", "56", "72"], answer: 0},
  {q: "6 × 4 = ?", options: ["24", "20", "28"], answer: 0},
  {q: "2 × 7 = ?", options: ["14", "12", "16"], answer: 0},
  {q: "9 × 9 = ?", options: ["81", "72", "90"], answer: 0},
  {q: "3 × 8 = ?", options: ["24", "28", "21"], answer: 0},
  {q: "5 × 5 = ?", options: ["25", "20", "30"], answer: 0},
  {q: "7 × 8 = ?", options: ["56", "64", "54"], answer: 0},
  {q: "4 × 7 = ?", options: ["28", "24", "32"], answer: 0},
  {q: "6 × 6 = ?", options: ["36", "30", "42"], answer: 0},
  {q: "8 × 9 = ?", options: ["72", "81", "63"], answer: 0},
  {q: "2 × 9 = ?", options: ["18", "16", "20"], answer: 0},
  {q: "7 × 5 = ?", options: ["35", "40", "30"], answer: 0},
  {q: "3 × 3 = ?", options: ["9", "6", "12"], answer: 0},
  {q: "6 × 8 = ?", options: ["48", "54", "44"], answer: 0},
  {q: "4 × 8 = ?", options: ["32", "36", "28"], answer: 0},
  {q: "9 × 6 = ?", options: ["54", "63", "48"], answer: 0},
  {q: "5 × 4 = ?", options: ["20", "15", "25"], answer: 0},
  {q: "8 × 2 = ?", options: ["16", "10", "14"], answer: 0}
];

let current = 0;
let score = 0;
let starsCollected = 0;
let currentShuffledOptions = [];
let correctTextForCurrentQuestion = "";

// Sound effects
let clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");
let wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function loadQuestion() {
  if (current >= questions.length) {
    document.getElementById("quiz").innerHTML = "";
    
    // Generate star icons string matching the total stars collected
    let starsString = "";
    for(let i = 0; i < starsCollected; i++) {
      starsString += "⭐ ";
    }
    if (starsCollected === 0) starsString = "None this time. Keep practicing!";

    document.getElementById("quiz").innerHTML = `
      <div id="result">
        <h2>🎉 Finished!</h2>
        <p>Final Score: <b>${score} / ${questions.length}</b></p>
        <p>Total Stars Collected: <b>${starsCollected} / ${questions.length}</b></p>
        <div class="star-display">${starsString}</div>
      </div>
    `;
    return;
  }

  let q = questions[current];
  correctTextForCurrentQuestion = q.options[q.answer];
  currentShuffledOptions = shuffle([...q.options]);

  let html = `<p class="q-text"><b>Question ${current + 1}: ${q.q}</b></p>`;
  
  currentShuffledOptions.forEach((opt, index) => {
    html += `<button onclick="check(${index})">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function check(selectedIndex) {
  clickSound.play();
  
  let selectedText = currentShuffledOptions[selectedIndex];
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((btn, idx) => {
    btn.disabled = true;
    let btnText = currentShuffledOptions[idx];

    if (btnText === correctTextForCurrentQuestion) {
      btn.style.background = "#a8e6a3"; 
      btn.style.borderColor = "#78e08f";
    }
    if (idx === selectedIndex && selectedText !== correctTextForCurrentQuestion) {
      btn.style.background = "#ffb3b3"; 
      btn.style.borderColor = "#ff4d4d";
    }
  });

  if (selectedText === correctTextForCurrentQuestion) {
    score++;
    starsCollected++;
    correctSound.play();
  } else {
    wrongSound.play();
  }

  document.getElementById("score").innerText = "Score: " + score + " / 30";
  document.getElementById("star-counter").innerText = "Stars: " + starsCollected + " ⭐";

  setTimeout(() => {
    current++;
    loadQuestion();
  }, 1200);
}

// Start game
loadQuestion();
</script>

</body>
</html>
