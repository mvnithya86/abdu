<!DOCTYPE html>
<html>
<head>
  <title>2-Digit and 1-Digit Subtraction Game</title>

  <style>
    body {
      font-family: Arial;
      background-color: #cfe8f7;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 450px;
      margin: auto;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #fff4b3;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>➖ 2-Digit & 1-Digit Subtraction Game</h2>

<div id="score">Score: 0</div>

<div class="box" id="quiz"></div>

<div id="result"></div>

<script>

let questions = [

  {q: "45 − 6 = ?", options: ["39", "41", "37"], answer: 0},
  {q: "72 − 8 = ?", options: ["64", "66", "62"], answer: 0},
  {q: "58 − 4 = ?", options: ["54", "52", "56"], answer: 0},
  {q: "91 − 7 = ?", options: ["84", "82", "86"], answer: 0},
  {q: "63 − 5 = ?", options: ["58", "56", "60"], answer: 0},
  {q: "80 − 9 = ?", options: ["71", "69", "73"], answer: 0},
  {q: "47 − 3 = ?", options: ["44", "42", "46"], answer: 0},
  {q: "66 − 8 = ?", options: ["58", "56", "60"], answer: 0},
  {q: "54 − 7 = ?", options: ["47", "45", "49"], answer: 0},
  {q: "39 − 2 = ?", options: ["37", "35", "38"], answer: 0}

];

let current = 0;
let score = 0;

let currentShuffledOptions = [];
let correctTextForCurrentQuestion = "";

// Sound Effects
let clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");

let correctSound = new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg");

let wrongSound = new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg");

function shuffle(array) {

  for (let i = array.length - 1; i > 0; i--) {

    let j = Math.floor(Math.random() * (i + 1));

    [array[i], array[j]] = [array[j], array[i]];
  }

  return array;
}

function loadQuestion() {

  if (current >= questions.length) {

    document.getElementById("quiz").innerHTML = "";

    document.getElementById("result").innerHTML =
      "🎉 Finished! Final Score: " + score + " / " + questions.length;

    return;
  }

  let q = questions[current];

  correctTextForCurrentQuestion = q.options[q.answer];

  currentShuffledOptions = shuffle([...q.options]);

  let html = `<p><b>${q.q}</b></p>`;

  currentShuffledOptions.forEach((opt, index) => {

    html += `<button onclick="check(${index})">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function check(selectedIndex) {

  clickSound.play();

  let selectedText = currentShuffledOptions[selectedIndex];

  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((btn, idx) => {

    btn.disabled = true;

    let btnText = currentShuffledOptions[idx];

    if (btnText === correctTextForCurrentQuestion) {

      btn.style.background = "#a8e6a3";
    }

    if (idx === selectedIndex &&
        selectedText !== correctTextForCurrentQuestion) {

      btn.style.background = "#ffb3b3";
    }
  });

  if (selectedText === correctTextForCurrentQuestion) {

    score++;

    correctSound.play();

  } else {

    wrongSound.play();
  }

  document.getElementById("score").innerText =
    "Score: " + score;

  setTimeout(() => {

    current++;

    loadQuestion();

  }, 1200);
}

loadQuestion();

</script>

</body>
</html>
